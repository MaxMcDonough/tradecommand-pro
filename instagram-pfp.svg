<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1e"/>
      <stop offset="100%" style="stop-color:#111b33"/>
    </linearGradient>
    <linearGradient id="bolt" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="1080" height="1080" rx="0" fill="url(#bg)"/>

  <!-- Very subtle glow behind bolt -->
  <circle cx="540" cy="460" r="180" fill="#3b82f6" opacity="0.07"/>

  <!-- Lightning bolt - large and centered -->
  <path d="M500 240 L600 440 L545 440 L590 640 L470 420 L530 420 Z" fill="url(#bolt)"/>

  <!-- TradeCommand text -->
  <text x="540" y="790" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif" font-size="78" font-weight="800" fill="white">TradeCommand</text>

  <!-- PRO badge -->
  <rect x="440" y="820" width="200" height="44" rx="22" fill="#3b82f6"/>
  <text x="540" y="850" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif" font-size="26" font-weight="800" fill="white" letter-spacing="6">PRO</text>
</svg>
