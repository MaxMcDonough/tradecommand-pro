<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradeCommand Pro - Features</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1200px;
            height: 628px;
            background: linear-gradient(135deg, #0f172a 0%, #1a1f3a 50%, #0f172a 100%);
            display: flex;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            position: relative;
        }

        .left-visual {
            position: absolute;
            left: 0;
            width: 500px;
            height: 100%;
            background: linear-gradient(90deg, rgba(99, 102, 241, 0.15), transparent);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chart-visual {
            position: relative;
            width: 250px;
            height: 250px;
            margin-left: 30px;
        }

        .chart-bar {
            position: absolute;
            background: linear-gradient(180deg, #10b981 0%, #059669 100%);
            border-radius: 8px 8px 0 0;
            bottom: 40px;
        }

        .bar-1 {
            width: 30px;
            height: 80px;
            left: 30px;
            animation: grow 1.5s ease-out forwards;
        }

        .bar-2 {
            width: 30px;
            height: 120px;
            left: 80px;
            animation: grow 1.5s ease-out 0.2s forwards;
        }

        .bar-3 {
            width: 30px;
            height: 95px;
            left: 130px;
            animation: grow 1.5s ease-out 0.4s forwards;
        }

        .bar-4 {
            width: 30px;
            height: 140px;
            left: 180px;
            animation: grow 1.5s ease-out 0.6s forwards;
        }

        @keyframes grow {
            from {
                height: 0;
                opacity: 0;
            }
            to {
                height: var(--height);
                opacity: 1;
            }
        }

        .chart-line {
            position: absolute;
            width: 180px;
            height: 3px;
            background: linear-gradient(90deg, #6366f1, #8b5cf6);
            bottom: 100px;
            left: 35px;
            border-radius: 2px;
            opacity: 0.7;
        }

        .content {
            flex: 1;
            padding: 50px 60px;
            color: #fff;
            position: relative;
            z-index: 10;
        }

        h1 {
            font-size: 48px;
            font-weight: 900;
            margin-bottom: 20px;
            line-height: 1.2;
            color: #fff;
        }

        .brand-name {
            background: linear-gradient(90deg, #6366f1, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .tagline {
            font-size: 16px;
            color: #a5b4fc;
            margin-bottom: 30px;
            font-weight: 500;
        }

        .features-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .feature {
            display: flex;
            align-items: center;
            font-size: 14px;
            color: #e0e7ff;
            font-weight: 500;
        }

        .feature-icon {
            display: inline-block;
            width: 24px;
            height: 24px;
            background: rgba(99, 102, 241, 0.3);
            border-radius: 6px;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
        }

        .cta-button {
            display: inline-block;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: #fff;
            padding: 14px 40px;
            border-radius: 28px;
            font-size: 15px;
            font-weight: 700;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 40px rgba(99, 102, 241, 0.3);
        }

        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 50px rgba(99, 102, 241, 0.4);
        }

        .url {
            display: inline-block;
            margin-left: 20px;
            font-size: 13px;
            color: #94a3b8;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="left-visual">
        <div class="chart-visual">
            <div class="chart-bar bar-1"></div>
            <div class="chart-bar bar-2"></div>
            <div class="chart-bar bar-3"></div>
            <div class="chart-bar bar-4"></div>
            <div class="chart-line"></div>
        </div>
    </div>

    <div class="content">
        <h1><span class="brand-name">TradeCommand</span><br>Pro</h1>
        <p class="tagline">Professional trading analytics for everyone</p>

        <div class="features-grid">
            <div class="feature">
                <span class="feature-icon">📊</span>
                <span>Real-Time P&L</span>
            </div>
            <div class="feature">
                <span class="feature-icon">🎯</span>
                <span>Strategy Attribution</span>
            </div>
            <div class="feature">
                <span class="feature-icon">⚡</span>
                <span>Risk Analytics</span>
            </div>
            <div class="feature">
                <span class="feature-icon">📝</span>
                <span>Trade Journal</span>
            </div>
        </div>

        <button class="cta-button">Start Free</button>
        <span class="url">tradecommandpro.com</span>
    </div>
</body>
</html>
