<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradeCommand Pro - Live Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a0e17;
            --card: #0f1219;
            --acc: #3b82f6;
            --grn: #10b981;
            --red: #ef4444;
            --text: #e5e7eb;
            --text-muted: #9ca3af;
        }

        body {
            background: linear-gradient(135deg, #0a0e17 0%, #111827 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* Floating background particles */
        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(59, 130, 246, 0.3);
            border-radius: 50%;
            animation: float 20s infinite;
        }

        @keyframes float {
            0%, 100% {
                opacity: 0.1;
                transform: translate(0, 0);
            }
            50% {
                opacity: 0.5;
            }
        }

        /* Main dashboard container */
        .dashboard {
            position: relative;
            width: 650px;
            height: 420px;
            background: linear-gradient(135deg, rgba(15, 18, 25, 0.95) 0%, rgba(10, 14, 23, 0.98) 100%);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 16px;
            box-shadow: 
                0 0 50px rgba(59, 130, 246, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Top bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid rgba(59, 130, 246, 0.1);
            background: rgba(0, 0, 0, 0.3);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            font-size: 14px;
            color: var(--text);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--grn);
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(16, 185, 129, 0.6);
            animation: pulse-dot 2s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% {
                box-shadow: 0 0 8px rgba(16, 185, 129, 0.6);
            }
            50% {
                box-shadow: 0 0 12px rgba(16, 185, 129, 1);
            }
        }

        .live-badge {
            background: linear-gradient(90deg, rgba(16, 185, 129, 0.2), rgba(16, 185, 129, 0.1));
            border: 1px solid rgba(16, 185, 129, 0.4);
            color: var(--grn);
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.5px;
            animation: glow-badge 2s ease-in-out infinite;
        }

        @keyframes glow-badge {
            0%, 100% {
                box-shadow: 0 0 10px rgba(16, 185, 129, 0.3);
            }
            50% {
                box-shadow: 0 0 15px rgba(16, 185, 129, 0.6);
            }
        }

        /* Ticker strip */
        .ticker-container {
            background: rgba(0, 0, 0, 0.4);
            border-bottom: 1px solid rgba(59, 130, 246, 0.1);
            padding: 8px 0;
            overflow: hidden;
            height: 28px;
            display: flex;
            align-items: center;
        }

        .ticker {
            display: flex;
            gap: 24px;
            animation: scroll-ticker 30s linear infinite;
            padding: 0 16px;
            white-space: nowrap;
        }

        .ticker:hover {
            animation-play-state: paused;
        }

        @keyframes scroll-ticker {
            0% {
                transform: translateX(0);
            }
            100% {
                transform: translateX(-50%);
            }
        }

        .ticker-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
        }

        .ticker-symbol {
            font-weight: 700;
            color: var(--text);
            min-width: 50px;
        }

        .ticker-price {
            color: var(--text-muted);
            font-size: 11px;
        }

        .ticker-change {
            font-weight: 700;
            min-width: 45px;
        }

        .ticker-change.up {
            color: var(--grn);
        }

        .ticker-change.down {
            color: var(--red);
        }

        /* Chart area */
        .chart-area {
            flex: 1;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .chart-title {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .candlestick-chart {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 8px;
            flex: 1;
            padding: 12px 0;
        }

        .candle {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            width: 20px;
            height: 100%;
            opacity: 0;
            animation: grow-candle 0.8s ease-out forwards;
        }

        .candle:nth-child(1) { animation-delay: 0s; }
        .candle:nth-child(2) { animation-delay: 2s; }
        .candle:nth-child(3) { animation-delay: 4s; }
        .candle:nth-child(4) { animation-delay: 6s; }
        .candle:nth-child(5) { animation-delay: 8s; }
        .candle:nth-child(6) { animation-delay: 10s; }
        .candle:nth-child(7) { animation-delay: 12s; }
        .candle:nth-child(8) { animation-delay: 14s; }

        @keyframes grow-candle {
            0% {
                opacity: 0;
                filter: drop-shadow(0 0 0 currentColor);
            }
            100% {
                opacity: 1;
                filter: drop-shadow(0 0 4px currentColor);
            }
        }

        .candle-body {
            width: 12px;
            min-height: 2px;
            border-radius: 2px;
            margin-bottom: 2px;
            position: relative;
            z-index: 2;
        }

        .candle-wick {
            width: 1px;
            background: currentColor;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .candle.bull .candle-body {
            background: var(--grn);
            box-shadow: 0 0 6px rgba(16, 185, 129, 0.5);
        }

        .candle.bull {
            color: var(--grn);
        }

        .candle.bear .candle-body {
            background: var(--red);
            box-shadow: 0 0 6px rgba(239, 68, 68, 0.5);
        }

        .candle.bear {
            color: var(--red);
        }

        /* Stock cards row */
        .cards-row {
            display: flex;
            gap: 10px;
            padding: 0 16px 12px;
        }

        .stock-card {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(59, 130, 246, 0.15);
            border-radius: 8px;
            padding: 10px;
            font-size: 11px;
            color: var(--text-muted);
            transition: all 0.3s ease;
        }

        .stock-card.signal-buy {
            animation: signal-flash-buy 0.8s ease-out;
        }

        .stock-card.signal-sell {
            animation: signal-flash-sell 0.8s ease-out;
        }

        @keyframes signal-flash-buy {
            0% {
                border-color: rgba(16, 185, 129, 0.8);
                background: rgba(16, 185, 129, 0.15);
                box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
            }
            100% {
                border-color: rgba(59, 130, 246, 0.15);
                background: rgba(0, 0, 0, 0.3);
                box-shadow: none;
            }
        }

        @keyframes signal-flash-sell {
            0% {
                border-color: rgba(239, 68, 68, 0.8);
                background: rgba(239, 68, 68, 0.15);
                box-shadow: 0 0 15px rgba(239, 68, 68, 0.4);
            }
            100% {
                border-color: rgba(59, 130, 246, 0.15);
                background: rgba(0, 0, 0, 0.3);
                box-shadow: none;
            }
        }

        .card-name {
            color: var(--text);
            font-weight: 700;
            display: block;
            margin-bottom: 6px;
        }

        .card-value {
            font-size: 13px;
            color: var(--acc);
            font-weight: 600;
        }

        /* Bottom stats bar */
        .stats-bar {
            background: rgba(0, 0, 0, 0.4);
            border-top: 1px solid rgba(59, 130, 246, 0.1);
            padding: 10px 16px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            font-size: 11px;
            color: var(--text-muted);
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .stat-label {
            color: var(--text-muted);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .stat-value {
            color: var(--text);
            font-weight: 700;
            font-size: 13px;
            font-family: 'Courier New', monospace;
        }

        .stat-value.profit {
            color: var(--grn);
        }

        /* Signal toast */
        .signal-toast {
            position: fixed;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: linear-gradient(135deg, rgba(15, 18, 25, 0.98) 0%, rgba(10, 14, 23, 0.98) 100%);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 8px;
            padding: 12px 16px;
            color: var(--text);
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
            pointer-events: none;
            animation: toast-slide 4s ease-in-out forwards;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
            backdrop-filter: blur(10px);
            z-index: 1000;
        }

        @keyframes toast-slide {
            0% {
                opacity: 0;
                transform: translateY(-50%) translateX(200px);
            }
            10% {
                opacity: 1;
                transform: translateY(-50%) translateX(0);
            }
            90% {
                opacity: 1;
                transform: translateY(-50%) translateX(0);
            }
            100% {
                opacity: 0;
                transform: translateY(-50%) translateX(200px);
            }
        }

        .toast-signal {
            color: var(--acc);
            font-weight: 700;
            margin-right: 8px;
        }

        .signal-toast.buy .toast-signal {
            color: var(--grn);
        }

        .signal-toast.sell .toast-signal {
            color: var(--red);
        }
    </style>
</head>
<body>
    <!-- Background particles -->
    <div class="particles" id="particles"></div>

    <!-- Main dashboard -->
    <div class="dashboard">
        <!-- Top bar -->
        <div class="top-bar">
            <div class="logo">
                <span class="status-dot"></span>
                TradeCommand Pro
            </div>
            <div class="live-badge">LIVE</div>
        </div>

        <!-- Ticker strip -->
        <div class="ticker-container">
            <div class="ticker" id="ticker">
                <div class="ticker-item">
                    <span class="ticker-symbol">AAPL</span>
                    <span class="ticker-price">$192.54</span>
                    <span class="ticker-change up">+2.43%</span>
                </div>
                <div class="ticker-item">
                    <span class="ticker-symbol">MSFT</span>
                    <span class="ticker-price">$381.20</span>
                    <span class="ticker-change down">-1.15%</span>
                </div>
                <div class="ticker-item">
                    <span class="ticker-symbol">NVDA</span>
                    <span class="ticker-price">$875.42</span>
                    <span class="ticker-change up">+3.87%</span>
                </div>
                <div class="ticker-item">
                    <span class="ticker-symbol">TSLA</span>
                    <span class="ticker-price">$248.65</span>
                    <span class="ticker-change down">-0.92%</span>
                </div>
                <div class="ticker-item">
                    <span class="ticker-symbol">META</span>
                    <span class="ticker-price">$564.32</span>
                    <span class="ticker-change up">+1.54%</span>
                </div>
                <!-- Duplicate for seamless scroll -->
                <div class="ticker-item">
                    <span class="ticker-symbol">AAPL</span>
                    <span class="ticker-price">$192.54</span>
                    <span class="ticker-change up">+2.43%</span>
                </div>
                <div class="ticker-item">
                    <span class="ticker-symbol">MSFT</span>
                    <span class="ticker-price">$381.20</span>
                    <span class="ticker-change down">-1.15%</span>
                </div>
                <div class="ticker-item">
                    <span class="ticker-symbol">NVDA</span>
                    <span class="ticker-price">$875.42</span>
                    <span class="ticker-change up">+3.87%</span>
                </div>
            </div>
        </div>

        <!-- Chart area -->
        <div class="chart-area">
            <div class="chart-title">Price Action - 4H</div>
            <div class="candlestick-chart" id="chart">
                <!-- Candles generated by JS -->
            </div>
        </div>

        <!-- Stock cards -->
        <div class="cards-row">
            <div class="stock-card" data-symbol="AAPL">
                <span class="card-name">AAPL</span>
                <span class="card-value">$192.54</span>
            </div>
            <div class="stock-card" data-symbol="MSFT">
                <span class="card-name">MSFT</span>
                <span class="card-value">$381.20</span>
            </div>
            <div class="stock-card" data-symbol="NVDA">
                <span class="card-name">NVDA</span>
                <span class="card-value">$875.42</span>
            </div>
        </div>

        <!-- Stats bar -->
        <div class="stats-bar">
            <div class="stat-item">
                <span class="stat-label">Session</span>
                <span class="stat-value">$25,000</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Deployed</span>
                <span class="stat-value">$8,420</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">P&L</span>
                <span class="stat-value profit">+$<span id="pnl-value">0</span>.50</span>
            </div>
        </div>
    </div>

    <script>
        // Create background particles
        function createParticles() {
            const container = document.getElementById('particles');
            const particleCount = 50;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDuration = (Math.random() * 30 + 15) + 's';
                particle.style.animationDelay = (Math.random() * -20) + 's';
                container.appendChild(particle);
            }
        }

        // Initialize candlestick chart
        function initializeChart() {
            const chart = document.getElementById('chart');
            const candleData = [
                { height: 45, isBull: true },
                { height: 65, isBull: false },
                { height: 55, isBull: true },
                { height: 75, isBull: true },
                { height: 50, isBull: false },
                { height: 70, isBull: true },
                { height: 60, isBull: false },
                { height: 80, isBull: true }
            ];

            candleData.forEach((data, index) => {
                const candle = document.createElement('div');
                candle.className = `candle ${data.isBull ? 'bull' : 'bear'}`;
                
                const wickHeight = Math.random() * 20 + 10;
                const body = document.createElement('div');
                body.className = 'candle-body';
                body.style.height = (data.height * 0.6) + 'px';
                
                const wick = document.createElement('div');
                wick.className = 'candle-wick';
                wick.style.height = wickHeight + 'px';
                wick.style.top = -(wickHeight + data.height * 0.6 + 4) + 'px';
                
                candle.appendChild(body);
                candle.appendChild(wick);
                chart.appendChild(candle);
            });
        }

        // Count up P&L value
        function animatePnL() {
            const pnlElement = document.getElementById('pnl-value');
            let currentValue = 0;
            const targetValue = 342;
            const increment = targetValue / 50;
            
            const interval = setInterval(() => {
                currentValue += increment;
                if (currentValue >= targetValue) {
                    currentValue = targetValue;
                    clearInterval(interval);
                }
                pnlElement.textContent = Math.floor(currentValue);
            }, 40);
        }

        // Signal toast manager
        const signals = [
            { type: 'buy', text: '🔥 BUY NVDA @ $875.42' },
            { type: 'sell', text: '❄️ SELL MSFT @ $381.20' },
            { type: 'buy', text: '🚀 BUY AAPL @ $192.54' },
            { type: 'sell', text: '⚠️ SELL TSLA @ $248.65' },
            { type: 'buy', text: '💎 BUY META @ $564.32' }
        ];

        let signalIndex = 0;

        function showSignalToast() {
            const signal = signals[signalIndex % signals.length];
            const toast = document.createElement('div');
            toast.className = `signal-toast ${signal.type}`;
            toast.innerHTML = signal.text;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, 4000);
            
            signalIndex++;
        }

        // Stock card signal animation
        function triggerCardSignal() {
            const cards = document.querySelectorAll('.stock-card');
            const randomCard = cards[Math.floor(Math.random() * cards.length)];
            const isSignalBuy = Math.random() > 0.4;
            
            randomCard.classList.add(isSignalBuy ? 'signal-buy' : 'signal-sell');
            
            setTimeout(() => {
                randomCard.classList.remove(isSignalBuy ? 'signal-buy' : 'signal-sell');
            }, 800);
        }

        // Initialize everything
        createParticles();
        initializeChart();
        animatePnL();

        // Signal toasts every 5 seconds
        setInterval(showSignalToast, 5000);
        showSignalToast(); // Show first one immediately

        // Card signals every 4 seconds
        setInterval(triggerCardSignal, 4000);
    </script>
</body>
</html>
