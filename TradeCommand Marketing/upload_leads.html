(async()=>{
  status('Connected to Firebase. Starting upload...');
  let total=0;
  
  // First: delete existing leads to avoid duplicates (25 personal already uploaded)
  log('Clearing partial uploads...');
  const existing = await db.collection('leads').get();
  if(existing.docs.length>0){
    for(let i=0;i<existing.docs.length;i+=450){
      const b=db.batch();
      existing.docs.slice(i,i+450).forEach(d=>b.delete(d.ref));
      await b.commit();
    }
    log('Cleared '+existing.docs.length+' existing leads.');
  }
  
  // Upload seed leads
  log('\nUploading '+SEED.length+' original seed leads...');
  for(let i=0;i<SEED.length;i+=450){
    const b=db.batch();
    SEED.slice(i,i+450).forEach(l=>{
      b.set(db.collection('leads').doc(),{...l,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    });
    await b.commit();
    total+=Math.min(450,SEED.length-i);
    log('  Seed batch: '+total+'/'+SEED.length);
  }
  
  // Also re-seed prospects
  log('\nRe-seeding '+SEED.length+' prospects...');
  const existingP = await db.collection('prospects').get();
  if(existingP.docs.length>0){
    for(let i=0;i<existingP.docs.length;i+=450){
      const b=db.batch();
      existingP.docs.slice(i,i+450).forEach(d=>b.delete(d.ref));
      await b.commit();
    }
  }
  for(let i=0;i<SEED.length;i+=450){
    const b=db.batch();
    SEED.slice(i,i+450).forEach(l=>{
      b.set(db.collection('prospects').doc(),{
        name:l.name,email:l.email||'',source:l.source||'LinkedIn',
        status:l.status||'new',score:l.score||0,
        linkedIn:l.linkedIn||'',notes:l.notes||'',dm:l.dm||'',
        lastContact:'',nextAction:l.dm?'Send LinkedIn DM':'',
        createdAt:firebase.firestore.FieldValue.serverTimestamp()
      });
    });
    await b.commit();
  }
  log('Prospects re-seeded.');
  
  // Upload personal leads
  log('\nUploading '+PERSONAL.length+' personal leads...');
  let pCount=0;
  for(let i=0;i<PERSONAL.length;i+=400){
    const b=db.batch();
    PERSONAL.slice(i,i+400).forEach(r=>{
      const name=(r[0]+' '+r[1]).trim();
      b.set(db.collection('leads').doc(),{
        name,firstName:r[0],lastName:r[1],
        score:r[2],type:r[3],priority:r[4],template:r[5],
        email:r[6]||'',phone:r[7]||'',instagram:r[8]||'',linkedIn:r[9]||'',
        notes:r[10]||'',source:'Personal Network',status:'new',
        company:'',role:'',location:'',outreachDate:'',reply:'',
        dm:(dmT[r[4]]||dmT.Low)(r[0]||name),
        createdAt:firebase.firestore.FieldValue.serverTimestamp()
      });
    });
    await b.commit();
    pCount+=Math.min(400,PERSONAL.length-i);
    log('  Personal batch: '+pCount+'/'+PERSONAL.length);
    status('Uploading personal leads: '+pCount+'/'+PERSONAL.length);
  }
  
  total=SEED.length+PERSONAL.length;
  status('DONE! Uploaded '+total+' total leads ('+SEED.length+' original + '+PERSONAL.length+' personal)');
  log('\n=== COMPLETE ===');
  log('Total: '+total+' leads');
  log(SEED.length+' original seed leads');
  log(PERSONAL.length+' personal network leads');
  log('50 prospects re-seeded');
})();
